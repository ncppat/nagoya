    function setWeather(weather) {
        currentWeather = weather;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        if(weather === 'sunny') document.querySelector('.btn-sunny').classList.add('active');
        if(weather === 'rainy') document.querySelector('.btn-rainy').classList.add('active');
        updateView();
    }

    function switchDay(dayNum) {
        currentDay = dayNum;
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            if(idx === dayNum - 1) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        updateView();
    }

    function updateView() {
        const dayData = data.days[currentDay];
        const config = dayData[currentWeather];

        document.getElementById('kpi-steps').innerText = config.steps;
        document.getElementById('kpi-transport').innerText = config.transport;
        document.getElementById('kpi-defense').innerText = config.defense;
        document.getElementById('note-container').innerHTML = dayData[`note_${currentWeather}`];

        const container = document.getElementById('timeline-container');
        container.innerHTML = '';
        config.timeline.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'timeline-item';
            itemDiv.innerHTML = `
                <div class="timeline-time">${item.time}</div>
                <div class="timeline-title">${item.title}</div>
                <div class="timeline-desc ${currentWeather === 'sunny' ? 'bg-sunny-desc' : 'bg-rainy-desc'}">${item.desc}</div>
            `;
            container.appendChild(itemDiv);
        });
    }

    window.onload = function() { updateView(); };
</script>
